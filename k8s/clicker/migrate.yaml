apiVersion: batch/v1
kind: Job
metadata:
  name: clicker-migrate
  namespace: homelab
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-db
        image: postgres:14
        command:
        - sh
        - -c
        - until pg_isready -h clicker-db -U postgres; do echo "waiting for postgres"; sleep 2; done
      containers:
      - name: migrate
        image: mikeder/clicker:latest-migrate
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: clicker-secret
              key: POSTGRES_PASSWORD
