apiVersion: apps/v1
kind: Deployment
metadata:
  name: clicker
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clicker
  template:
    metadata:
      labels:
        app: clicker
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:14
        command:
        - sh
        - -c
        - until pg_isready -h clicker-db -U postgres; do echo "waiting for postgres"; sleep 2; done
      imagePullSecrets:
      - name: gitea-registry
      containers:
      - name: clicker
        image: git.sqweeb.net/mikeder/clicker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: clicker-secret
---
apiVersion: v1
kind: Service
metadata:
  name: clicker
  namespace: homelab
spec:
  selector:
    app: clicker
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clicker
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: homelab-redirect-https@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - click.sqweeb.net
    secretName: clicker-tls
  rules:
  - host: click.sqweeb.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clicker
            port:
              number: 8080
