apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wireguard-config
  namespace: homelab
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wireguard
    spec:
      # Pod-level sysctls — requires k3s node to allow these unsafe sysctls.
      # Add to /etc/rancher/k3s/config.yaml:
      #   kube-apiserver-arg:
      #   - "allowed-unsafe-sysctls=net.ipv4.conf.all.src_valid_mark,net.ipv4.ip_forward"
      securityContext:
        sysctls:
        - name: net.ipv4.conf.all.src_valid_mark
          value: "1"
        - name: net.ipv4.ip_forward
          value: "1"
      containers:
      - name: wg-easy
        image: ghcr.io/wg-easy/wg-easy:latest
        ports:
        - containerPort: 51820
          protocol: UDP
          name: vpn
        - containerPort: 51821
          protocol: TCP
          name: ui
        env:
        - name: LANG
          value: "en"
        - name: WG_PORT
          value: "51820"
        - name: WG_DEFAULT_ADDRESS
          value: "10.8.0.x"
        - name: WG_DEFAULT_DNS
          value: "1.1.1.1"
        - name: WG_ALLOWED_IPS
          value: "0.0.0.0/0,::/0,192.168.1.0/24"
        - name: WG_PERSISTENT_KEEPALIVE
          value: "25"
        envFrom:
        - secretRef:
            name: wireguard-secret
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_MODULE
        volumeMounts:
        - name: config
          mountPath: /etc/wireguard
        - name: tun
          mountPath: /dev/net/tun
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: wireguard-config
      - name: tun
        hostPath:
          path: /dev/net/tun
---
# NodePort exposes UDP 51820 on the node IP for VPN clients
apiVersion: v1
kind: Service
metadata:
  name: wireguard-vpn
  namespace: homelab
spec:
  selector:
    app: wireguard
  type: NodePort
  ports:
  - name: vpn
    port: 51820
    targetPort: 51820
    nodePort: 51820
    protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: wireguard-ui
  namespace: homelab
spec:
  selector:
    app: wireguard
  ports:
  - name: ui
    port: 51821
    targetPort: 51821
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wireguard
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: homelab-redirect-https@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - wg.sqweeb.net
    secretName: wireguard-tls
  rules:
  - host: wg.sqweeb.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wireguard-ui
            port:
              number: 51821
