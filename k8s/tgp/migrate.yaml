apiVersion: batch/v1
kind: Job
metadata:
  name: tgp-migrate
  namespace: homelab
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-db
        image: postgres:14
        command:
        - sh
        - -c
        - until pg_isready -h tgp-db -U tgp; do echo "waiting for postgres"; sleep 2; done
      containers:
      - name: migrate
        image: mikeder/tinygameplatform:migrate
        env:
        - name: DATABASEHOST
          value: tgp-db
        - name: DATABASEUSERNAME
          value: tgp
        - name: DATABASEPASSWORD
          valueFrom:
            secretKeyRef:
              name: tgp-secret
              key: DB_PASSWORD
