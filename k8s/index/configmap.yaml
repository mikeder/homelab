apiVersion: v1
kind: ConfigMap
metadata:
  name: index-nginx-conf
  namespace: homelab
data:
  default.conf: |
    server {
        real_ip_header      X-Forwarded-For;
        set_real_ip_from    10.42.0.0/16; # k3s pod CIDR (Traefik runs here)

        listen 80;

        server_name frontend;
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
