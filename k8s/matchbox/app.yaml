apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchbox
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchbox
  template:
    metadata:
      labels:
        app: matchbox
    spec:
      containers:
      - name: matchbox
        image: jhelsing/matchbox-server:0.6
        ports:
        - containerPort: 3536
---
apiVersion: v1
kind: Service
metadata:
  name: matchbox
  namespace: homelab
spec:
  selector:
    app: matchbox
  ports:
  - port: 3536
    targetPort: 3536
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matchbox
  namespace: homelab
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: homelab-redirect-https@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - match.sqweeb.net
    secretName: matchbox-tls
  rules:
  - host: match.sqweeb.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: matchbox
            port:
              number: 3536
