apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: act-runner-data
  namespace: homelab
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
# The act_runner needs a Docker daemon to run CI jobs.
# This Deployment uses a Docker-in-Docker (dind) sidecar instead of mounting
# the host's /var/run/docker.sock, which doesn't exist in a k3s environment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      initContainers:
      - name: wait-for-gitea
        image: curlimages/curl:latest
        command:
        - sh
        - -c
        - until curl -sf http://gitea:3000; do echo "waiting for gitea"; sleep 5; done
      containers:
      - name: runner
        image: docker.io/gitea/act_runner:latest
        env:
        - name: GITEA_INSTANCE_URL
          value: "https://git.sqweeb.net"
        - name: GITEA_RUNNER_NAME
          value: "k3s-runner"
        - name: DOCKER_HOST
          value: "tcp://localhost:2376"
        - name: DOCKER_TLS_VERIFY
          value: ""
        envFrom:
        - secretRef:
            name: act-runner-secret
        volumeMounts:
        - name: runner-data
          mountPath: /data
      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        ports:
        - containerPort: 2376
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: act-runner-data
