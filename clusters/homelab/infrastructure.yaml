# `flux-system/` in this directory is generated by `flux bootstrap` (not
# hand-written) and includes a GitRepository named "flux-system" that this
# Kustomization's sourceRef points at.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # No SOPS-encrypted files under infrastructure/ yet, but wired up so the
  # first one just works. Requires a `sops-age` Secret in flux-system,
  # created out-of-band (never committed) - see infrastructure/README.md.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
