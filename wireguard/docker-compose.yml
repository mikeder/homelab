version: "3"

services:
  wg-easy:
    container_name: wg-easy
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "51820:51820/udp"
    volumes:
      - /home/meder/homelab/wireguard/config:/etc/wireguard
    environment:
      - LANG=en
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_ADMIN_PASSWORD_HASH}
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0,192.168.1.0/24
      - WG_PERSISTENT_KEEPALIVE=25
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      # enable traefik ingress
      - traefik.enable=true
      - traefik.http.services.wg-easy.loadbalancer.server.port=51821

      # http web ui
      - traefik.http.routers.wg-easy-http.entrypoints=http
      - traefik.http.routers.wg-easy-http.rule=Host(`${WG_UI_DOMAIN}`)
      - traefik.http.routers.wg-easy-http.middlewares=redirect-https
      - traefik.http.routers.wg-easy-http.service=wg-easy

      # https web ui
      - traefik.http.routers.wg-easy-https.tls=true
      - traefik.http.routers.wg-easy-https.entrypoints=https
      - traefik.http.routers.wg-easy-https.tls.certresolver=letsencrypt
      - traefik.http.routers.wg-easy-https.rule=Host(`${WG_UI_DOMAIN}`)
      - traefik.http.routers.wg-easy-https.service=wg-easy

networks:
  proxy:
    external: true
