# Pinned to the chart version already running on the cluster (installed by
# hand via the now-retired infra/traefik/deploy.sh) so this HelmRelease's
# first reconcile adopts the existing `metallb` release as a no-op upgrade
# instead of a fresh install. Bump deliberately via PR once you want to
# upgrade - `flux get helmrelease metallb -n metallb-system` shows drift.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 10m
  releaseName: metallb
  targetNamespace: metallb-system
  chart:
    spec:
      chart: metallb
      version: "0.16.1"
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  # Defaults are fine for a 2-node bare-metal cluster - nothing to override.
  # IP allocation lives in ipaddresspool.yaml / l2advertisement.yaml.
  values: {}
