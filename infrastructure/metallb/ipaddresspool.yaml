# Must sit inside 192.168.1.0/24 (the node subnet) but outside your router's
# DHCP lease range. Ported verbatim from the range already live on the
# cluster - change here (via PR) rather than editing the cluster directly.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: lan-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.2-192.168.1.99
