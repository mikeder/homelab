# Pinned to the chart version already running on the cluster so this
# HelmRelease's first reconcile adopts the existing `traefik` release as a
# no-op upgrade instead of a fresh install.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  releaseName: traefik
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  values:
    # TLS certs come from cert-manager (../cert-manager/), not Traefik's own
    # ACME store - no certificatesResolvers here, no PVC needed.
    service:
      type: LoadBalancer # backed by MetalLB (../metallb/)

    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure # http -> https
              scheme: https
              permanent: true
      # websecure.http.tls.enabled defaults to true in this chart already

    providers:
      kubernetesCRD:
        enabled: true # IngressRoute / Middleware CRDs
      kubernetesIngress:
        enabled: true # required so cert-manager's HTTP-01 solver Ingress gets routed

    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik

    # Dashboard/API stay ClusterIP-only (not on the LoadBalancer). Reach it with:
    #   kubectl port-forward -n traefik svc/traefik 9000:9000
    api:
      dashboard: true
      insecure: false
