# HTTP-01 solver routes the ACME challenge through a temporary Ingress that
# cert-manager creates on the fly — Traefik must have its Kubernetes Ingress
# provider enabled (see ../traefik/release.yaml) to pick that up.
#
# Use letsencrypt-staging while testing routes/DNS — untrusted certs but no
# rate limits. Switch a Certificate's issuerRef to letsencrypt-prod once
# you're confident it'll actually succeed.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sqweebking@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sqweebking@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
